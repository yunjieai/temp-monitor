<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠端溫度監控系統</title>
    <!-- 引入 Bootstrap 5 樣式 -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- 引入 MQTT.js 網路通訊庫 -->
    <script src="https://unpkg.com"></script>
    <!-- 引入 Chart.js 圖表庫與矩陣/熱力圖套件 -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Microsoft JhengHei', sans-serif; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 12px; }
        .temp-display { font-size: 4.5rem; font-weight: bold; color: #0d6efd; line-height: 1; }
        .status-badge { width: 12px; height: 12px; display: inline-block; border-radius: 50%; }
        .bg-online { background-color: #2ec4b6; }
        .bg-offline { background-color: #e71d36; }
        .chart-container { position: relative; height: 260px; width: 100%; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <!-- 頂部狀態欄 -->
    <div class="card p-3 mb-4">
        <div class="row align-items-center">
            <div class="col-md-4">
                <h3 class="mb-0 fw-bold text-secondary">溫度監控系統 <span class="fs-6 text-muted">雲端網頁版</span></h3>
            </div>
            <div class="col-md-8 text-md-end mt-2 mt-md-0">
                <span class="me-3"><span id="mqtt-status-dot" class="status-badge bg-offline me-1"></span> MQTT狀態: <strong id="mqtt-status-text">連線中...</strong></span>
                <span>最後更新: <strong id="last-update-time">--:--:--</strong></span>
            </div>
        </div>
    </div>

    <!-- 即時數據與大字顯示 -->
    <div class="row mb-4">
        <div class="col-lg-4 mb-3 mb-lg-0">
            <div class="card p-4 text-center h-100 d-flex flex-column justify-content-center">
                <h5 class="text-muted fw-bold">當前環境溫度</h5>
                <div class="my-3">
                    <span id="current-temp" class="temp-display">--</span>
                    <span class="fs-2 fw-bold text-secondary"> ℃</span>
                </div>
                <div id="stat-summary" class="text-muted small">
                    今日最大值: <span id="today-max">--</span>℃ | 最小值: <span id="today-min">--</span>℃
                </div>
            </div>
        </div>
        <!-- 每秒即時趨勢圖 -->
        <div class="col-lg-8">
            <div class="card p-3 h-100">
                <h6 class="fw-bold text-secondary mb-3">每秒即時溫度趨勢（最近60筆）</h6>
                <div class="chart-container">
                    <canvas id="secChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 統計圖表區 -->
    <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
            <div class="card p-3">
                <h6 class="fw-bold text-secondary mb-3">每分統計 (平均 / 最大 / 最小)</h6>
                <div class="chart-container">
                    <canvas id="minChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h6 class="fw-bold text-secondary mb-3">每時統計 (平均 / 最大 / 最小)</h6>
                <div class="chart-container">
                    <canvas id="hourChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 今日熱力圖區 -->
    <div class="row">
        <div class="col-12">
            <div class="card p-3">
                <h6 class="fw-bold text-secondary mb-3">今日各時段熱力圖 (10分鐘平均區塊)</h6>
                <div style="position: relative; height: 350px; width: 100%;">
                    <canvas id="heatmapChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ====== MQTT 雲端連線設定 (請與 Python 端對齊) ======
    // 這裡預設使用 HiveMQ Cloud 的公共 WebSocket 協定進行網頁端連線
    const MQTT_BROKER = 'wss://://hivemq.com'; 
    const TOPIC_REALTIME = 'factory/temperature/realtime';
    const TOPIC_STATS = 'factory/temperature/stats'; // 用於接收每分/每時/熱力圖數據

    // 資料快取區
    let secData = Array(60).fill(null);
    let secLabels = Array(60).fill('');
    for(let i=0; i<60; i++) secLabels[i] = i + 's';

    // 初始化 Chart.js 圖表
    const ctxSec = document.getElementById('secChart').getContext('2d');
    const secChart = new Chart(ctxSec, {
        type: 'line',
        data: {
            labels: secLabels,
            datasets: [{
                label: '即時溫度',
                data: secData,
                borderColor: '#0d6efd',
                borderWidth: 2,
                pointRadius: 0,
                fill: false,
                tension: 0.1
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 15, max: 35 } } }
    });

    // 每分與每時圖表初始化 (以折線圖包覆區間或多線呈現)
    const initStatChart = (canvasId, labelName) => {
        return new Chart(document.getElementById(canvasId).getContext('2d'), {
            type: 'line',
            data: {
                labels: Array.from({length: 60}, (_, i) => i + 1),
                datasets: [
                    { label: '平均值', data: [], borderColor: '#2ec4b6', fill: false },
                    { label: '最大值', data: [], borderColor: '#e71d36', borderDash:, fill: false },
                    { label: '最小值', data: [], borderColor: '#ff9f1c', borderDash:, fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    };
    const minChart = initStatChart('minChart', '每分');
    const hourChart = initStatChart('hourChart', '每時');

    // 初始化今日熱力圖 (Matrix Chart)
    const heatmapData = [];
    for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 10) {
            heatmapData.push({ x: m, y: h, v: 0 }); // v 為溫度值
        }
    }
    const heatmapChart = new Chart(document.getElementById('heatmapChart').getContext('2d'), {
        type: 'matrix',
        data: {
            datasets: [{
                label: '溫度熱力圖',
                data: heatmapData,
                backgroundColor(context) {
                    const value = context.dataset.data[context.dataIndex].v;
                    if (!value) return '#e9ecef';
                    // 根據溫度動態計算顏色 (22度~28度)
                    const alpha = Math.min(Math.max((value - 22) / 6, 0), 1);
                    return `rgba(231, 29, 54, ${alpha})`;
                },
                width: ({chart}) => chart.chartArea ? (chart.chartArea.width / 6) - 2 : 0,
                height: ({chart}) => chart.chartArea ? (chart.chartArea.height / 24) - 2 : 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { type: 'linear', min: -5, max: 55, ticks: { stepSize: 10, callback: v => v + '分' } },
                y: { type: 'linear', min: -0.5, max: 23.5, ticks: { stepSize: 1, callback: v => v + '時' }, reverse: true }
            }
        }
    });

    // ====== MQTT 連線與通訊邏輯 ======
    const client = mqtt.connect(MQTT_BROKER);

    client.on('connect', () => {
        document.getElementById('mqtt-status-dot').className = 'status-badge bg-online';
        document.getElementById('mqtt-status-text').innerText = '已連線 (雲端監聽中)';
        client.subscribe(TOPIC_REALTIME);
        client.subscribe(TOPIC_STATS);
    });

    client.on('close', () => {
        document.getElementById('mqtt-status-dot').className = 'status-badge bg-offline';
        document.getElementById('mqtt-status-text').innerText = '中斷連線';
    });

    client.on('message', (topic, message) => {
        const data = JSON.parse(message.toString());
        const now = new Date();
        document.getElementById('last-update-time').innerText = now.toLocaleTimeString();

        if (topic === TOPIC_REALTIME) {
            // 處理每秒即時資料
            const pv = data.pv;
            document.getElementById('current-temp').innerText = pv.toFixed(1);
            
            // 推入並更新即時圖表
            secData.push(pv);
            if (secData.length > 60) secData.shift();
            secChart.update('none'); // 使用 'none' 模式提高渲染效能
        } 
        else if (topic === TOPIC_STATS) {
            // 處理統計型資料 (由 Python 定時打包傳送過來)
            if (data.type === 'minute') {
                minChart.data.datasets[0].data = data.avg;
                minChart.data.datasets[1].data = data.max;
                minChart.data.datasets[2].data = data.min;
                minChart.update();
            } else if (data.type === 'hour') {
                hourChart.data.datasets[0].data = data.avg;
                hourChart.data.datasets[1].data = data.max;
                hourChart.data.datasets[2].data = data.min;
                hourChart.update();
            } else if (data.type === 'heatmap') {
                // 更新熱力圖矩陣
                heatmapChart.data.datasets[0].data = data.matrix;
                heatmapChart.update();
                
                // 更新今日極值
                document.getElementById('today-max').innerText = data.today_max;
                document.getElementById('today-min').innerText = data.today_min;
            }
        }
    });
</script>
</body>
</html>
